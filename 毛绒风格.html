<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>毛绒治愈 · 毛绒质感海报提示词生成器 - 古月AI智能体</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Microsoft YaHei",sans-serif;
}

/* 页面背景 */

body{

background:
linear-gradient(135deg,#ffd9e6,#ffe9d9,#e7e6ff,#d9f3ff);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:60px;

color:#444;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* 容器 */

.container{
max-width:1200px;
margin:auto;
}

/* 标题 */

h1{

text-align:center;

font-size:36px;

margin-bottom:50px;

background:linear-gradient(90deg,#ff7fa5,#ffb6a3,#8ecaff);

-webkit-background-clip:text;

color:transparent;

}

/* 输入卡片 */

.card{

background:linear-gradient(
145deg,
rgba(255,255,255,0.75),
rgba(255,255,255,0.55)
);

backdrop-filter:blur(14px);

padding:30px;

border-radius:28px;

box-shadow:

0 20px 40px rgba(0,0,0,0.12);

margin-bottom:30px;

}

/* 输入 */

label{
font-size:14px;
opacity:0.8;
}

input{

width:100%;

padding:14px;

margin-top:8px;
margin-bottom:18px;

border-radius:12px;

border:none;

background:rgba(255,255,255,0.9);

font-size:15px;

}

/* 按钮 */

button{

padding:14px 20px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

background:

linear-gradient(
90deg,
#ff9eb5,
#ffc7a8,
#9bd6ff
);

color:#fff;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 12px 24px rgba(0,0,0,0.2);

}

.generate{
width:100%;
}

/* 结果区域 */

.results{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(460px,1fr));

gap:22px;

margin-top:40px;

}

/* 卡片 */

.promptCard{

background:

linear-gradient(
135deg,
#ffffff,
#fff2f6
);

border-radius:22px;

padding:24px;

box-shadow:

0 15px 35px rgba(0,0,0,0.15);

transition:0.3s;

}

.promptCard:hover{

transform:translateY(-4px);

}

/* 标题 */

.promptTitle{

font-size:18px;

font-weight:700;

margin-bottom:10px;

color:#ff7fa5;

}

/* 文本 */

.promptText{

white-space:pre-wrap;

line-height:1.7;

font-size:14px;

}

/* 复制按钮 */

.copyBtn{

margin-top:14px;

background:

linear-gradient(
90deg,
#ff9eb5,
#ffc7a8
);

padding:8px 16px;

border-radius:10px;

border:none;

cursor:pointer;

font-size:14px;

color:#fff;

}

.copyBtn.copied{

background:#4ade80;

}

</style>
</head>

<body>

<div class="container">

<h1>毛绒治愈 · 毛绒质感海报提示词生成器 - 古月AI智能体</h1>

<div class="card">

<label>海报主题</label>
<input id="title" placeholder="例如：暖萌毛绒派对">

<label>海报副标题</label>
<input id="subtitle" placeholder="例如：冬日治愈毛绒世界">

<label>海报类型</label>
<input id="type" placeholder="例如：潮玩发布 / 亲子活动 / 冬季品牌">

<label>辅助文字（可输入多个，用 / 分隔）</label>
<input id="assist" placeholder="例如：暖萌来袭 / 限量发售 / 治愈系">

<button class="generate" onclick="generate()">生成20组提示词</button>

</div>

<div id="results" class="results"></div>

</div>

<script>

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

let assistTexts=[

"限量发售","暖萌来袭","治愈系","限定款",
"冬日限定","毛绒新品","温暖上市","萌趣系列",
"可爱推荐","暖心礼物","萌宠主题","亲子活动",
"毛绒派对","冬季新品","治愈企划","毛绒艺术"

];

let visuals=[

"泰迪熊与毛线团场景",
"毛绒兔兔与毛球装饰",
"毛绒猫咪与针织毛毯",
"毛绒怪兽与毛球云朵",
"毛绒蛋糕与毛绒水果",
"毛绒仙人掌与毛绒花朵",
"毛绒星球与毛绒云朵",
"毛绒家具与毛绒玩偶"

];

let layouts=[

"主标题毛绒立体字居中，副标题毛毡标签悬挂",

"主标题毛线编织字体，副标题刺绣小标",

"标题毛绒立体字突出，副标题针织标签",

"标题毛绒大字悬浮，副标题毛毡牌子装饰",

"标题与毛球互动排版，副标题贴布标签"

];

function generate(){

let title=document.getElementById("title").value.trim();
let subtitle=document.getElementById("subtitle").value.trim();
let type=document.getElementById("type").value.trim();
let assistInput=document.getElementById("assist").value.trim();

if(!title){
alert("请输入海报主题");
return;
}

let container=document.getElementById("results");
container.innerHTML="";

let userAssist=[];

if(assistInput){
userAssist=assistInput.split("/");
}

for(let i=1;i<=20;i++){

let assist;

if(userAssist.length>0){
assist=rand(userAssist);
}else{
assist=rand(assistTexts);
}

let visual=rand(visuals);
let layout=rand(layouts);

let text=`主标题：${title}
副标题：${subtitle}
海报类型：${type || "毛绒治愈风格海报"}

辅助文字：${assist}

核心视觉元素：${visual}

视觉表现手法：绒毛纤维细节、蓬松空气感、毛线编织纹理、毛球装饰、柔和光影过渡。

文字布局：${layout}

风格：毛绒质感视觉设计，柔软温暖，萌趣治愈，绒毛细节丰富，蓬松感强烈，色彩柔和。`;

let card=document.createElement("div");

card.className="promptCard";

card.innerHTML=`

<div class="promptTitle">提示词 #${i}</div>

<div class="promptText">${text}</div>

<button class="copyBtn">复制提示词</button>

`;

let btn=card.querySelector("button");

btn.onclick=function(){

navigator.clipboard.writeText(text);

btn.innerText="已复制";

btn.classList.add("copied");

setTimeout(()=>{

btn.innerText="复制提示词";

btn.classList.remove("copied");

},2000);

};

container.appendChild(card);

}

}

</script>

</body>
</html>
