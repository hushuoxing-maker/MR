<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛绒治愈 · 毛绒质感海报提示词生成器 - 古月AI智能体</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Microsoft YaHei",sans-serif;
}

body{

background:linear-gradient(135deg,#ffe4ec,#ffd6c9,#e8e3ff,#d9f4ff);

min-height:100vh;

padding:60px;

color:#444;

}

/* 页面容器 */

.container{
max-width:1200px;
margin:auto;
}

/* 标题 */

h1{

text-align:center;
font-size:36px;
margin-bottom:50px;

background:linear-gradient(90deg,#ff7fa5,#ffb6a3,#8ecaff);
-webkit-background-clip:text;
color:transparent;

}

/* 输入卡片 */

.card{

background:rgba(255,255,255,0.65);

backdrop-filter:blur(12px);

padding:30px;

border-radius:26px;

box-shadow:0 15px 40px rgba(0,0,0,0.15);

margin-bottom:30px;

}

/* 输入框 */

label{
font-size:14px;
opacity:0.8;
}

input{

width:100%;
padding:14px;

margin-top:8px;
margin-bottom:18px;

border-radius:12px;
border:none;

background:rgba(255,255,255,0.9);

font-size:15px;

}

/* 按钮 */

button{

padding:14px 20px;
border:none;
border-radius:12px;
cursor:pointer;

font-size:16px;

background:linear-gradient(90deg,#ff9eb5,#ffc7a8,#9bd6ff);

color:#fff;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);

}

.generate{
width:100%;
}

/* 结果区域 */

.results{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(460px,1fr));

gap:22px;

margin-top:40px;

}

/* 提示词卡片 */

.promptCard{

background:linear-gradient(135deg,#ffffff,#fff4f8);

border-radius:22px;

padding:24px;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

transition:0.3s;

}

.promptCard:hover{

transform:translateY(-3px);

}

.promptTitle{

font-size:18px;
font-weight:700;
margin-bottom:10px;

color:#ff7fa5;

}

.promptText{

white-space:pre-wrap;

line-height:1.7;

font-size:14px;

}

/* 复制按钮 */

.copyBtn{

margin-top:14px;

background:linear-gradient(90deg,#ff9eb5,#ffc7a8);

padding:8px 16px;

border-radius:10px;

border:none;

cursor:pointer;

font-size:14px;

color:#fff;

}

.copyBtn.copied{

background:#4ade80;

}

</style>
</head>

<body>

<div class="container">

<h1>毛绒治愈 · 毛绒质感海报提示词生成器 - 古月AI智能体</h1>

<div class="card">

<label>海报主题</label>
<input id="title" placeholder="例如：暖萌毛绒派对">

<label>海报副标题</label>
<input id="subtitle" placeholder="例如：冬日治愈毛绒世界">

<label>海报类型</label>
<input id="type" placeholder="例如：潮玩发布 / 亲子活动 / 冬季品牌">

<button class="generate" onclick="generate()">生成20组提示词</button>

</div>

<div id="results" class="results"></div>

</div>

<script>

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* 辅助标签 */

let assistTexts=[

"限量发售","暖萌来袭","治愈系","限定款",
"冬日限定","毛绒新品","温暖上市","萌趣系列",
"可爱推荐","暖心礼物","萌宠主题","亲子活动",
"毛绒派对","冬季新品","治愈企划","毛绒艺术"

];

/* 视觉元素 */

let visuals=[

"泰迪熊与毛线团场景",
"毛绒兔兔与毛球装饰",
"毛绒猫咪与针织毛毯",
"毛绒怪兽与毛球云朵",
"毛绒蛋糕与毛绒水果",
"毛绒仙人掌与毛绒花朵",
"毛绒星球与毛绒云朵",
"毛绒家具与毛绒玩偶",
"毛绒小熊与针织围巾",
"毛绒怪兽与毛线编织背景",
"毛绒猫咪与羊羔绒沙发",
"毛绒兔兔与毛绒气球",
"毛绒蛋糕与奶油色背景",
"毛绒森林与毛绒动物",
"毛绒云朵与毛绒星星"

];

/* 排版 */

let layouts=[

"主标题毛绒立体字居中，副标题毛毡标签悬挂，辅助文字毛球点缀",
"主标题毛线编织字体，副标题刺绣小标，辅助文字散布画面",
"标题毛绒立体字突出，副标题针织标签排列",
"标题毛绒大字悬浮，副标题毛毡牌子装饰",
"标题与毛球互动排版，副标题贴布标签形式",
"标题立体毛绒字，副标题缝线标签",
"标题居中毛绒字体，副标题毛毡小牌",
"标题毛线字体，副标题刺绣装饰"

];

function generate(){

let title=document.getElementById("title").value.trim();
let subtitle=document.getElementById("subtitle").value.trim();
let type=document.getElementById("type").value.trim();

if(!title){

alert("请输入海报主题");

return;

}

let container=document.getElementById("results");

container.innerHTML="";

for(let i=1;i<=20;i++){

let assist=rand(assistTexts);
let visual=rand(visuals);
let layout=rand(layouts);

let text=`主标题：${title}
副标题：${subtitle}
海报类型：${type || "毛绒治愈风格海报"}

辅助文字：${assist}

核心视觉元素：${visual}

视觉表现手法：绒毛纤维细节、蓬松空气感、柔和光影过渡、毛线编织纹理、毛球流苏装饰、毛绒材质与纽扣等光滑材质对比、漂浮绒毛氛围。

文字布局：${layout}

风格：毛绒质感视觉设计，柔软温暖，萌趣治愈，绒毛细节丰富，蓬松感强烈，色彩柔和（马卡龙色系、大地色系、莫兰迪色系），整体仿佛可以触摸的温暖。`;

let card=document.createElement("div");

card.className="promptCard";

card.innerHTML=`

<div class="promptTitle">提示词 #${i}</div>

<div class="promptText">${text}</div>

<button class="copyBtn">复制提示词</button>

`;

let btn=card.querySelector("button");

btn.onclick=function(){

navigator.clipboard.writeText(text);

btn.innerText="已复制";

btn.classList.add("copied");

setTimeout(()=>{

btn.innerText="复制提示词";

btn.classList.remove("copied");

},3000);

};

container.appendChild(card);

}

}

</script>

</body>
</html>
