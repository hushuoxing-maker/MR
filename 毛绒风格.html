<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>像素世界 · 高级像素风格海报提示词生成器-古月AI智能体</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Courier New","Lucida Console",monospace;
}

/* 页面背景 */

body{

background:
radial-gradient(circle at 20% 20%,#1d1d3a,#0a0a12 60%),
linear-gradient(135deg,#111,#000);

color:#fff;

min-height:100vh;

padding:60px;

}

/* 像素网格 */

body::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:

repeating-linear-gradient(
0deg,
rgba(255,255,255,0.03) 0 1px,
transparent 1px 4px
),

repeating-linear-gradient(
90deg,
rgba(255,255,255,0.03) 0 1px,
transparent 1px 4px
);

pointer-events:none;

}

.container{

max-width:1200px;
margin:auto;

}

/* 标题 */

h1{

text-align:center;

font-size:36px;

margin-bottom:50px;

font-weight:700;

background:linear-gradient(90deg,#ffcc00,#ff6600);

-webkit-background-clip:text;

color:transparent;

text-shadow:0 0 15px rgba(255,170,0,0.6);

}

/* 输入卡片 */

.card{

background:

linear-gradient(
145deg,
rgba(40,40,60,0.9),
rgba(20,20,30,0.9)
);

padding:28px;

border-radius:18px;

border:2px solid rgba(255,170,0,0.5);

box-shadow:

0 0 25px rgba(255,170,0,0.2);

margin-bottom:40px;

}

/* 输入 */

label{

font-size:14px;

color:#ffcc66;

}

input{

width:100%;

padding:14px;

margin-top:8px;
margin-bottom:18px;

background:rgba(0,0,0,0.6);

border:1px solid #444;

border-radius:10px;

color:#fff;

font-size:15px;

}

/* 按钮 */

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

font-size:16px;

font-weight:700;

cursor:pointer;

background:

linear-gradient(
135deg,
#ffcc00,
#ff6600
);

color:#000;

box-shadow:

0 0 15px rgba(255,170,0,0.6);

transition:0.25s;

}

button:hover{

transform:translateY(-2px);

box-shadow:

0 0 25px rgba(255,170,0,0.9);

}

/* 结果区 */

.results{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(460px,1fr));

gap:22px;

margin-top:30px;

}

/* 卡片 */

.promptCard{

background:

linear-gradient(
160deg,
rgba(35,35,50,0.95),
rgba(20,20,30,0.95)
);

border-radius:16px;

padding:22px;

border-left:5px solid #ffcc00;

box-shadow:

0 0 18px rgba(255,170,0,0.2);

transition:0.25s;

}

.promptCard:hover{

transform:translateY(-3px);

box-shadow:

0 0 28px rgba(255,170,0,0.4);

}

/* 标题 */

.promptTitle{

font-size:18px;

font-weight:700;

margin-bottom:10px;

color:#ffcc00;

}

/* 文本 */

.promptText{

white-space:pre-wrap;

font-size:14px;

line-height:1.7;

color:#ddd;

}

/* 复制按钮 */

.copyBtn{

margin-top:12px;

background:linear-gradient(135deg,#ff6600,#ffcc00);

border:none;

padding:8px 16px;

border-radius:8px;

color:#000;

cursor:pointer;

font-weight:700;

}

.copyBtn.copied{

background:#ffaa33;

}

</style>
</head>

<body>

<div class="container">

<h1>像素世界 · 高级像素风格海报提示词生成器-古月AI智能体</h1>

<div class="card">

<label>海报主题</label>
<input id="title" placeholder="例如：像素世界大冒险">

<label>海报副标题</label>
<input id="subtitle" placeholder="例如：复古像素风格游戏发布">

<label>海报类型</label>
<input id="type" placeholder="例如：游戏发布 / 独立音乐 / 数字艺术">

<label>辅助文字（可输入多个，用 / 分隔）</label>
<input id="assist" placeholder="例如：LEVEL UP / BOSS / EXTRA LIFE">

<button onclick="generate()">生成20组提示词</button>

</div>

<div id="results" class="results"></div>

</div>

<script>

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

let assistTexts=[
"NEW GAME","SCORE","LIVE","LEVEL UP",
"EXTRA LIFE","TOP 10","BOSS",
"任务完成","宝箱开启","像素币",
"奖励领取","按键操作","道具收集",
"复古限量","像素狂欢"
];

let visualElements=[

"像素勇者与怪物战斗",
"像素城堡关卡地图",
"像素森林探索",
"8-bit 太空冒险",
"16-bit 马赛克特效",
"像素金币与宝箱",
"红白机卡带与手柄",
"像素火焰与技能特效",
"像素迷宫探索",
"复古街机屏幕",
"CRT 扫描线效果",
"像素城市夜景"

];

let layoutStyles=[

"主标题屏幕中央像素大字，副标题小字在下方，辅助文字像素标签散落",

"主标题顶部横贯，副标题像素对话框，辅助文字沿边缘分布",

"主标题像素云托起，副标题生命值条显示，辅助文字小图标点缀",

"主标题居中突出，副标题游戏提示框，辅助文字状态栏显示",

"主标题像素屏幕效果，副标题弹窗小字，辅助文字散落角落"

];

function generate(){

let title=document.getElementById("title").value.trim();
let subtitle=document.getElementById("subtitle").value.trim();
let type=document.getElementById("type").value.trim();
let assistInput=document.getElementById("assist").value.trim();

if(!title){
alert("请输入海报主题");
return;
}

let container=document.getElementById("results");
container.innerHTML="";

/* 用户辅助词 */

let userAssist=[];

if(assistInput){
userAssist=assistInput.split("/");
}

for(let i=1;i<=20;i++){

let assist;

if(userAssist.length>0){
assist=rand(userAssist);
}else{
assist=rand(assistTexts);
}

let visual=rand(visualElements);
let layout=rand(layoutStyles);

let text=`主标题：${title}
副标题：${subtitle}
海报类型：${type || "像素风格活动"}

辅助文字：${assist}

核心视觉元素：${visual}

文字布局：${layout}

风格：像素风格，高级视觉设计，8-bit/16-bit像素块美学，复古游戏感，方块构成，色彩高饱和，怀旧科技氛围，整体画面参考经典像素游戏UI界面。`;

let card=document.createElement("div");

card.className="promptCard";

card.innerHTML=`

<div class="promptTitle">提示词 #${i}</div>

<div class="promptText">${text}</div>

<button class="copyBtn">复制提示词</button>

`;

let btn=card.querySelector("button");

btn.onclick=function(){

navigator.clipboard.writeText(text);

btn.innerText="已复制";
btn.classList.add("copied");

setTimeout(()=>{

btn.innerText="复制提示词";
btn.classList.remove("copied");

},2000);

};

container.appendChild(card);

}

}

</script>

</body>
</html>
